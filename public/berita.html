<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berita - UNMURA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="text-2xl font-bold text-blue-900">UNMURA</a>
      <div class="space-x-4">
        <a href="/" class="text-gray-600 hover:text-blue-600">Beranda</a>
        <a href="/berita.html" class="text-blue-900 font-semibold">Berita</a>
        <a href="/contact.html" class="text-gray-600 hover:text-blue-600">Kontak</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-20">
    <h1 class="text-4xl font-bold text-blue-900 mb-10">Berita & Pengumuman</h1>
    <div id="berita-list" class="space-y-6">
      <!-- Diisi JS -->
    </div>
  </main>

  <script>
    async function loadAllBerita() {
      try {
        const res = await fetch('/api/berita');
        const berita = await res.json();
        const container = document.getElementById('berita-list');
        container.innerHTML = berita.map(item => `
          <div class="bg-white rounded-2xl p-6 shadow-sm">
            <span class="text-sm text-blue-600 font-semibold">${item.kategori}</span>
            <h2 class="text-xl font-bold mt-2">${item.judul}</h2>
            <p class="text-gray-600 mt-2">${item.konten}</p>
            <p class="text-sm text-gray-400 mt-3">${item.tanggal}</p>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }
    document.addEventListener('DOMContentLoaded', loadAllBerita);
  </script>
</body>
</html>
